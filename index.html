<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>atento sale de casa · vol. 01</title>
  <meta property="og:title" content="atento sale de casa · vol. 01" />
  <meta property="og:description" content="Experiencia Atento" />
  <meta property="og:image" content="imagen 1.jpg" />
  <meta property="og:type" content="website" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; min-height: 100%; overflow: hidden;
      background: #000; font-family: Arial, Helvetica, sans-serif; touch-action: auto;
    }
    .app { position: relative; width: 100dvw; height: 100dvh; overflow: hidden; background: #000; }
    .track { display: flex; width: 100%; height: 100%; transition: transform 0.45s cubic-bezier(0.22,1,0.36,1); will-change: transform; }
    .slide {
      min-width: 100%;
      width: 100%;
      height: 100%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .controls { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; }
    .nav { pointer-events: auto; border: 0; width: 52px; height: 52px; border-radius: 999px; background: rgba(0,0,0,0.5); color:#fff; font-size:28px; cursor:pointer; backdrop-filter: blur(4px); }
    .fullscreen-btn, .exit-fullscreen-btn {
      position:absolute; z-index:20; border:0; width:48px; height:48px; border-radius:999px;
      background: rgba(0,0,0,0.5); color:#fff; font-size:24px; display:flex; align-items:center; justify-content:center;
    }
    .fullscreen-btn { right:16px; bottom:16px; }
    .exit-fullscreen-btn { right:16px; top:16px; }
    .portrait-lock { position:absolute; inset:0; display:none; }
    .portrait-lock.visible { display:flex; }
    .portrait-lock img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="track" id="track"></div>

    <div class="controls" id="controls">
      <button class="nav" id="prevBtn">‹</button>
      <button class="nav" id="nextBtn">›</button>
    </div>

    <button class="exit-fullscreen-btn hidden" id="exitFullscreenBtn">×</button>
    <button class="fullscreen-btn hidden" id="enterFullscreenBtn">⤢</button>
    <div class="portrait-lock" id="portraitLock"></div>
  </div>

<script>
const coverImage = 'imagen 0.jpg';
const carouselImages = Array.from({ length: 9 }, (_, i) => `imagen ${i + 1}.jpg`);

const app = document.getElementById('app');
const track = document.getElementById('track');
const portraitLock = document.getElementById('portraitLock');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const enterFullscreenBtn = document.getElementById('enterFullscreenBtn');
const exitFullscreenBtn = document.getElementById('exitFullscreenBtn');

let currentIndex = 0;
let isPortraitMobileMode = false;
let startX = 0, startY = 0, isDragging = false, isLocked = false, dragStartTime = 0, lastDeltaX = 0;

function isMobileLike(){ return window.matchMedia('(max-width:900px)').matches; }
function isPortrait(){ return window.matchMedia('(orientation:portrait)').matches; }
function shouldShowCover(){ return isMobileLike() && isPortrait(); }

function buildSlides(){
  track.innerHTML='';
  carouselImages.forEach((src,i)=>{
    const slide=document.createElement('div');
    slide.className='slide';
    slide.innerHTML=`<img src="${src}"/>`;
    track.appendChild(slide);
  });
}

function render(animate=true){
  track.style.transition = animate ? 'transform 0.45s cubic-bezier(0.22,1,0.36,1)' : 'none';
  isPortraitMobileMode = shouldShowCover();

  if(isPortraitMobileMode){
    portraitLock.classList.add('visible');
    portraitLock.innerHTML = `<img src="${coverImage}"/>`;
    track.style.transform = 'translate3d(0,0,0)';
  } else {
    portraitLock.classList.remove('visible');
    portraitLock.innerHTML = '';
    const w = app.clientWidth;
    track.style.transform = `translate3d(-${currentIndex * w}px,0,0)`;
  }

  updateFullscreenButtons();
}

function goTo(i){
  currentIndex = Math.max(0, Math.min(i, carouselImages.length - 1));
  render();
}

function next(){
  if(currentIndex >= carouselImages.length - 1){ render(); return; }
  goTo(currentIndex + 1);
}

function prev(){
  if(currentIndex <= 0){ render(); return; }
  goTo(currentIndex - 1);
}

function applyDrag(dx){
  const w = app.clientWidth;
  const minOffset = -((carouselImages.length - 1) * w);
  const base = -(currentIndex * w);
  let offset = base + dx;

  if (offset > 0) {
    offset = dx * 0.2;
  }

  if (offset < minOffset) {
    offset = minOffset + ((offset - minOffset) * 0.2);
  }

  track.style.transform = `translate3d(${offset}px,0,0)`;
}

function finishSwipe(dx,dt){
  const w = app.clientWidth;
  const velocity = dt > 0 ? Math.abs(dx) / dt : 0;

  if(currentIndex < carouselImages.length - 1 && (dx < -w*0.18 || (dx < -25 && velocity > 0.5))) {
    next();
    return;
  }

  if(currentIndex > 0 && (dx > w*0.18 || (dx > 25 && velocity > 0.5))) {
    prev();
    return;
  }

  render();
}

track.addEventListener('touchstart',e=>{
  if(isPortraitMobileMode) return;
  if(e.touches.length>1) return;

  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
  dragStartTime=Date.now();
  lastDeltaX=0;
  isDragging=true;
  isLocked=false;
  track.style.transition='none';
});

track.addEventListener('touchmove',e=>{
  if(!isDragging || isPortraitMobileMode) return;
  const t=e.touches[0];
  const dx=t.clientX-startX;
  const dy=t.clientY-startY;

  if(!isLocked){
    if(Math.abs(dx)>Math.abs(dy)) isLocked=true;
    else { isDragging=false; render(); return; }
  }

  lastDeltaX=dx;
  applyDrag(dx);
});

track.addEventListener('touchend',()=>{
  if(!isDragging) return;
  isDragging=false;
  finishSwipe(lastDeltaX, Date.now()-dragStartTime);
});

prevBtn.onclick = prev;
nextBtn.onclick = next;

function isFullscreenActive(){ return !!document.fullscreenElement; }
function supportsFullscreen(){ return !!app.requestFullscreen; }

async function enterFullscreen(){
  if(!supportsFullscreen()) return;
  await app.requestFullscreen();
}
async function exitFullscreen(){
  if(document.exitFullscreen) await document.exitFullscreen();
}

function updateFullscreenButtons(){
  const mobile = isMobileLike();
  const fs = isFullscreenActive();
  const ok = supportsFullscreen();
  exitFullscreenBtn.classList.toggle('hidden', !(mobile && fs && ok));
  enterFullscreenBtn.classList.toggle('hidden', !(mobile && !fs && ok));
}

enterFullscreenBtn.onclick = enterFullscreen;
exitFullscreenBtn.onclick = exitFullscreen;

document.addEventListener('fullscreenchange', updateFullscreenButtons);

window.addEventListener('resize', ()=>render(false));
window.addEventListener('touchend', ()=>{ if (isDragging) return; lastDeltaX = 0; }, { passive: true });
window.addEventListener('orientationchange', ()=>render(false));

buildSlides();
render(false);
updateFullscreenButtons();
</script>
</body>
</html>
