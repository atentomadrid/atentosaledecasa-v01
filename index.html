<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Carrusel horizontal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: pan-y;
    }

    .app {
      position: relative;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.35s ease;
      will-change: transform;
    }

    .slide {
      min-width: 100vw;
      min-width: 100dvw;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    .slide img {
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
    }

    .nav {
      pointer-events: auto;
      border: 0;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .nav:active {
      transform: scale(0.96);
    }

    .status {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .portrait-lock {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(0,0,0,0.15);
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }

    .portrait-lock.visible {
      display: flex;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="track" id="track"></div>

    <div class="controls" id="controls">
      <button class="nav" id="prevBtn" aria-label="Imagen anterior">‹</button>
      <button class="nav" id="nextBtn" aria-label="Imagen siguiente">›</button>
    </div>

    <div class="status" id="status"></div>
    <div class="portrait-lock" id="portraitLock"></div>
  </div>

  <script>
    // Archivos disponibles:
    // imagen 0.jpg --> portada para móvil en vertical
    // imagen 1.jpg a imagen 9.jpg --> carrusel real
    const coverImage = 'imagen 0.jpg';
    const carouselImages = Array.from({ length: 9 }, (_, i) => `imagen ${i + 1}.jpg`);

    const track = document.getElementById('track');
    const status = document.getElementById('status');
    const portraitLock = document.getElementById('portraitLock');
    const controls = document.getElementById('controls');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // Índice del carrusel real (0 = imagen 1.jpg, 9 = imagen 10.jpg)
    let currentIndex = 0;
    let isPortraitMobileMode = false;

    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function isMobileLike() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function isPortrait() {
      return window.matchMedia('(orientation: portrait)').matches;
    }

    function shouldShowCover() {
      return isMobileLike() && isPortrait();
    }

    function buildSlides() {
      track.innerHTML = '';

      const coverSlide = document.createElement('div');
      coverSlide.className = 'slide';
      coverSlide.dataset.type = 'cover';
      coverSlide.innerHTML = `<img src="${coverImage}" alt="Imagen 0" />`;
      track.appendChild(coverSlide);

      carouselImages.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.dataset.type = 'carousel';
        slide.dataset.index = i;
        slide.innerHTML = `<img src="${src}" alt="Imagen ${i + 1}" />`;
        track.appendChild(slide);
      });
    }

    function updateStatus() {
      if (isPortraitMobileMode) {
        status.textContent = 'Imagen 0';
      } else {
        status.textContent = `Imagen ${currentIndex + 1} de ${carouselImages.length}`;
      }
    }

    function updateControls() {
      const hide = isPortraitMobileMode;
      controls.classList.toggle('hidden', hide);
      portraitLock.classList.toggle('visible', hide);
      portraitLock.textContent = hide
        ? 'Gira el móvil en horizontal para navegar las imágenes.'
        : '';
    }

    function render(animate = true) {
      track.style.transition = animate ? 'transform 0.35s ease' : 'none';

      isPortraitMobileMode = shouldShowCover();

      if (isPortraitMobileMode) {
        track.style.transform = 'translateX(0vw)';
      } else {
        const visibleSlide = currentIndex + 1; // +1 porque la primera slide es la imagen 0
        track.style.transform = `translateX(-${visibleSlide * 100}vw)`;
      }

      updateStatus();
      updateControls();
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, carouselImages.length - 1));
      if (!isPortraitMobileMode) {
        render();
      } else {
        updateStatus();
      }
    }

    function next() {
      goTo(currentIndex + 1);
    }

    function prev() {
      goTo(currentIndex - 1);
    }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);

    window.addEventListener('keydown', (event) => {
      if (isPortraitMobileMode) return;
      if (event.key === 'ArrowRight') next();
      if (event.key === 'ArrowLeft') prev();
    });

    track.addEventListener('touchstart', (event) => {
      if (isPortraitMobileMode) return;
      startX = event.touches[0].clientX;
      currentX = startX;
      isDragging = true;
      track.style.transition = 'none';
    }, { passive: true });

    track.addEventListener('touchmove', (event) => {
      if (!isDragging || isPortraitMobileMode) return;
      currentX = event.touches[0].clientX;
      const deltaX = currentX - startX;
      const visibleSlide = currentIndex + 1;
      const offset = -visibleSlide * window.innerWidth + deltaX;
      track.style.transform = `translateX(${offset}px)`;
    }, { passive: true });

    track.addEventListener('touchend', () => {
      if (!isDragging || isPortraitMobileMode) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = window.innerWidth * 0.15;

      if (deltaX < -threshold) {
        next();
      } else if (deltaX > threshold) {
        prev();
      } else {
        render();
      }
    });

    function setViewportSize() {
      const vh = window.innerHeight * 0.01;
      const vw = window.innerWidth * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      document.documentElement.style.setProperty('--vw', `${vw}px`);
    }

    setViewportSize();
    window.addEventListener('resize', () => {
      setViewportSize();
      render(false);
    });
    window.addEventListener('orientationchange', () => render(false));

    buildSlides();
    render(false);
  </script>
</body>
</html>
