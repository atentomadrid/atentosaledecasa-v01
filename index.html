<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>Carrusel horizontal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: auto;
    }

    .app {
      position: relative;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.35s ease;
      will-change: transform;
    }

    .slide {
      min-width: 100vw;
      min-width: 100dvw;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    .slide img {
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      background: #000;
    }

    .controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
    }

    @media (max-width: 900px) {
      .controls {
        display: none;
      }
    }

    .nav {
      pointer-events: auto;
      border: 0;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .nav:active {
      transform: scale(0.96);
    }

    .status {
      display: none;
    }

    .portrait-lock {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(0,0,0,0.15);
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }

    .portrait-lock.visible {
      display: flex;
    }

    .portrait-lock img {
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .fullscreen-btn,
    .exit-fullscreen-btn {
      position: absolute;
      z-index: 20;
      border: 0;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fullscreen-btn {
      right: 16px;
      bottom: 16px;
    }

    .exit-fullscreen-btn {
      right: 16px;
      top: 16px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="track" id="track"></div>

    <div class="controls" id="controls">
      <button class="nav" id="prevBtn" aria-label="Imagen anterior">‹</button>
      <button class="nav" id="nextBtn" aria-label="Imagen siguiente">›</button>
    </div>

    <div class="status" id="status"></div>
    <button class="exit-fullscreen-btn hidden" id="exitFullscreenBtn" aria-label="Salir de pantalla completa">×</button>
    <button class="fullscreen-btn hidden" id="enterFullscreenBtn" aria-label="Entrar en pantalla completa">⤢</button>
    <div class="portrait-lock" id="portraitLock"></div>
  </div>

  <script>
    // Archivos disponibles:
    // imagen 0.jpg --> portada para móvil en vertical
    // imagen 1.jpg a imagen 9.jpg --> carrusel real
    const coverImage = 'imagen 0.jpg';
    const carouselImages = Array.from({ length: 9 }, (_, i) => `imagen ${i + 1}.jpg`);

    const track = document.getElementById('track');
    const status = document.getElementById('status');
    const exitFullscreenBtn = document.getElementById('exitFullscreenBtn');
    const enterFullscreenBtn = document.getElementById('enterFullscreenBtn');
    const portraitLock = document.getElementById('portraitLock');
    const controls = document.getElementById('controls');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // Índice del carrusel real (0 = imagen 1.jpg, 9 = imagen 10.jpg)
    let currentIndex = 0;
    let isPortraitMobileMode = false;

    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function isMobileLike() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function isPortrait() {
      return window.matchMedia('(orientation: portrait)').matches;
    }

    function shouldShowCover() {
      return isMobileLike() && isPortrait();
    }

    function buildSlides() {
      track.innerHTML = '';

      carouselImages.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.dataset.type = 'carousel';
        slide.dataset.index = i;
        slide.innerHTML = `<img src="${src}" alt="Imagen ${i + 1}" />`;
        track.appendChild(slide);
      });
    }

    function updateStatus() {
      status.textContent = '';
    }

    function updateControls() {
      const hide = isPortraitMobileMode;
      const mobile = isMobileLike();
      controls.classList.toggle('hidden', hide || mobile);
      portraitLock.classList.toggle('visible', hide);
      portraitLock.innerHTML = hide ? `<img src="${coverImage}" alt="Imagen 0" />` : '';
      updateFullscreenButtons();
    }

    function render(animate = true) {
      track.style.transition = animate ? 'transform 0.35s ease' : 'none';

      isPortraitMobileMode = shouldShowCover();

      if (isPortraitMobileMode) {
        track.style.transform = 'translateX(0vw)';
      } else {
        const visibleSlide = currentIndex;
        track.style.transform = `translateX(-${visibleSlide * 100}vw)`;
      }

      updateStatus();
      updateControls();
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, carouselImages.length - 1));
      if (!isPortraitMobileMode) {
        render();
      } else {
        updateStatus();
      }
    }

    function next() {
      goTo(currentIndex + 1);
    }

    function isFullscreenActive() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
    }

    async function enterFullscreen() {
      try {
        const element = document.documentElement;
        if (element.requestFullscreen) {
          await element.requestFullscreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (error) {
        console.warn('No se pudo activar pantalla completa.', error);
      }
      updateFullscreenButtons();
    }

    async function exitFullscreen() {
      try {
        if (document.exitFullscreen) {
          await document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      } catch (error) {
        console.warn('No se pudo salir de pantalla completa.', error);
      }
      updateFullscreenButtons();
    }

    function updateFullscreenButtons() {
      const isMobile = isMobileLike();
      const fullscreen = isFullscreenActive();
      exitFullscreenBtn.classList.toggle('hidden', !(isMobile && fullscreen));
      enterFullscreenBtn.classList.toggle('hidden', !(isMobile && !fullscreen));
    }

    function tryAutoFullscreen() {
      if (!isMobileLike()) return;
      if (isFullscreenActive()) return;
      enterFullscreen();
    }

    function bindAutoFullscreenTriggers() {
      const trigger = () => {
        if (!isFullscreenActive()) {
          tryAutoFullscreen();
        }
      };

      document.addEventListener('touchstart', trigger, { passive: true, once: true });
      document.addEventListener('click', trigger, { passive: true, once: true });
    }

    function prev() {
      goTo(currentIndex - 1);
    }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    enterFullscreenBtn.addEventListener('click', enterFullscreen);
    exitFullscreenBtn.addEventListener('click', exitFullscreen);

    document.addEventListener('fullscreenchange', updateFullscreenButtons);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButtons);
    document.addEventListener('msfullscreenchange', updateFullscreenButtons);

    window.addEventListener('keydown', (event) => {
      if (isPortraitMobileMode) return;
      if (event.key === 'ArrowRight') next();
      if (event.key === 'ArrowLeft') prev();
    });

    track.addEventListener('touchstart', (event) => {
      if (isPortraitMobileMode) return;
      if (event.touches.length > 1) {
        isDragging = false;
        return;
      }
      startX = event.touches[0].clientX;
      currentX = startX;
      isDragging = true;
      track.style.transition = 'none';
    }, { passive: true });

    track.addEventListener('touchmove', (event) => {
      if (!isDragging || isPortraitMobileMode) return;
      if (event.touches.length > 1) return;
      currentX = event.touches[0].clientX;
      const deltaX = currentX - startX;
      const visibleSlide = currentIndex;
      const offset = -visibleSlide * window.innerWidth + deltaX;
      track.style.transform = `translateX(${offset}px)`;
    }, { passive: true });

    track.addEventListener('touchend', () => {
      if (!isDragging || isPortraitMobileMode) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = window.innerWidth * 0.15;

      if (deltaX < -threshold) {
        next();
      } else if (deltaX > threshold) {
        prev();
      } else {
        render();
      }
    });

    function setViewportSize() {
      const vh = window.innerHeight * 0.01;
      const vw = window.innerWidth * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      document.documentElement.style.setProperty('--vw', `${vw}px`);
    }

    setViewportSize();
    window.addEventListener('resize', () => {
      setViewportSize();
      render(false);
    });
    window.addEventListener('orientationchange', () => render(false));

    buildSlides();
    render(false);
    updateFullscreenButtons();
    bindAutoFullscreenTriggers();

    window.addEventListener('load', () => {
      setTimeout(() => {
        tryAutoFullscreen();
        updateFullscreenButtons();
      }, 300);
    });

  </script>
</body>
</html>
